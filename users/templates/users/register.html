{% extends "taskmanagement_app/base.html" %}
{% block content %}
<div id="logs" style="padding-bottom: 100px; padding-top: 100px;">
  <div class="card" id="register" style="background-color: yellow;">
    <h3>Signup</h3>
    <form method="post" action="{% url 'users:register' %}" >
        {% csrf_token %}
        {{ form.as_p }}      
        <button name="submit" class="button">Signup</button>
        <input type="hidden" name="next" value="{% url 'taskmanagement_app:home' %}" />
    </form>
  </div>
</div> 
{% endblock content %}

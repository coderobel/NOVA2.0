{% extends 'taskmanagement_app/base.html' %}
{% block content %}
<div id="logs">
    <div style="padding-top:150px;  padding-left: 350px; padding-right: 350px; padding-bottom:50px;">
        <div style="background-color: black; padding: 14px; border-radius: 10px;">
            <h1 style="color:yellow;">Add a New Entry for - </h1>
            <h1 style="color: yellow;">{{topic.text}}</h1>
        </div>
    </div>
    <div style="padding-top: 0px; padding-bottom: 150px; padding-left: 320px;">
        <form action="{% url 'learning_logs:newentry' topic.id%}" method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button name="submit" class="btn btn-primary" style="margin-left: 600px;">Add entry</button>
        </form>
    </div>
</div>
{% endblock content %}
